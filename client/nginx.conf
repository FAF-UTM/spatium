# Serves the built SPA with history-API fallback so client-side routes
# (e.g. /ro/admin/news/:id) resolve to index.html.
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip text assets (images/fonts are already compressed).
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml
        application/manifest+json;

    # Long-cache fingerprinted build assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Never cache the HTML entry point so new deploys are picked up.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback: unknown paths return the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Basic health endpoint for platform checks.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
